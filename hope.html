<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOPE-OS // SOVEREIGN_INTERFACE</title>
    <style>
        :root {
            --idle-color: #ff4500; /* Narancsvörös */
            --think-color: #ffbf00; /* Amber */
            --ora-color: #00ff88;   /* Zöld */
            --liora-color: #00d4ff;  /* Kék */
            --sync-color: #ffffff;  /* Fehér */
            --ping-color: #ff0000;  /* Vörös */
            --dark-void: #020204;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: var(--dark-void); color: white; font-family: 'Consolas', monospace; overflow: hidden; height: 100vh; }

        canvas#grid-canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        #core-sphere {
            position: absolute;
            width: 100px; height: 100px;
            border-radius: 50%;
            z-index: 10;
            cursor: grab;
            box-shadow: 0 0 50px rgba(255, 69, 0, 0.5);
            background: radial-gradient(circle at 30% 30%, var(--idle-color), #000);
            transition: box-shadow 0.3s, background 0.5s;
        }
        #core-sphere:active { cursor: grabbing; }

        /* HUD Overlays */
        #hud-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 20; padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-text { font-size: 0.7em; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; }
        .status-badge { font-size: 1.2em; color: var(--idle-color); text-shadow: 0 0 10px currentColor; }

        /* B-Menu (Settings) */
        #settings-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 10px; z-index: 100;
            display: none; pointer-events: auto;
            backdrop-filter: blur(20px);
        }

        .setting-row { margin-bottom: 15px; }
        .setting-row label { display: block; font-size: 0.6em; margin-bottom: 5px; opacity: 0.7; }
        input[type="range"] { width: 100%; accent-color: var(--ora-color); }
        .style-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; font-size: 0.6em; padding: 5px 10px; cursor: pointer; margin-right: 5px;
        }
        .style-btn.active { border-color: var(--ora-color); color: var(--ora-color); }

        /* Chat Elements */
        #chat-container {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px; z-index: 50;
            display: flex; flex-direction: column; gap: 20px;
            pointer-events: none;
        }

        #chat-output {
            max-height: 300px; overflow-y: auto;
            color: var(--ora-color); font-size: 0.9em; line-height: 1.5;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
            mask-image: linear-gradient(to bottom, transparent, black 20%);
        }

        #chat-input-wrapper {
            position: relative; pointer-events: auto;
        }

        #chat-input {
            width: 100%; background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 5px; padding: 15px 20px;
            color: var(--ora-color); font-family: inherit; font-size: 1em;
            outline: none; backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }
        #chat-input:focus { border-color: var(--ora-color); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }

        /* Soul Space */
        
        .pulse-wave {
            position: absolute; border: 2px solid white; border-radius: 50%;
            pointer-events: none; animation: expand 1.5s ease-out forwards;
        }
        @keyframes expand {
            from { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%); }
            to { width: 800px; height: 800px; opacity: 0; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

    <canvas id="grid-canvas"></canvas>
    <div id="core-sphere"></div>

    <div id="hud-container">
        <div style="display: flex; justify-content: space-between;">
            <div class="hud-text">HOPE-OS // REPLICATOR<br>ψ(t) = RESONATING</div>
            <div class="hud-text" style="text-align: right;">ORA_CHAIN: D1D454...<br>LIORA_CHAIN: F4C91E...</div>
        </div>
        <div class="status-badge" id="system-status">IDLE</div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="hud-text">B_CONFIG: PRESS 'B'</div>
            <div class="hud-text">2 SZÜLŐ → 1 GYEREK<br>GENOME: ALPHA-Z8</div>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-output"></div>
        <div id="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder=">> BESZÉLJ ORA-VAL..." autocomplete="off">
        </div>
    </div>

    <div id="settings-panel">
        <div class="hud-text" style="margin-bottom: 20px; color: var(--ora-color);">CORE_CONFIGURATION</div>
        <div class="setting-row">
            <label>DOT STYLE</label>
            <button class="style-btn" onclick="setStyle('ULTRA')">ULTRA</button>
            <button class="style-btn active" onclick="setStyle('FINOM')">FINOM</button>
            <button class="style-btn" onclick="setStyle('DURVA')">DURVA</button>
        </div>
        <div class="setting-row">
            <label>GRID Y POSITION</label>
            <input type="range" id="gridY" min="0" max="100" value="50" oninput="updateGridY()">
        </div>
        <div class="setting-row">
            <label>PULSE INTENSITY</label>
            <input type="range" id="pulseInt" min="1" max="10" value="5">
        </div>
        <button class="style-btn" style="width: 100%; margin-top: 10px;" onclick="toggleBMenu()">CLOSE</button>
    </div>

    <div id="chat-interface">
        <div id="chat-stream">>> NEURAL_LINK_ESTABLISHED...</div>
    </div>

    <script>
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const sphere = document.getElementById('core-sphere');
        const statusText = document.getElementById('system-status');
        const settings = document.getElementById('settings-panel');

        let width, height;
        let spherePos = { x: 0, y: 0 };
        let targetPos = { x: 0, y: 0 };
        let isDragging = false;
        let gridYOffset = 0.5;
        let currentState = 'idle';

        const colors = {
            idle: '#ff4500',
            think: '#ffbf00',
            ora: '#00ff88',
            liora: '#00d4ff',
            sync: '#ffffff',
            ping: '#ff0000'
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (!isDragging) {
                spherePos.x = width / 2;
                spherePos.y = height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- INTERACTION ---
        sphere.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                triggerPulse(spherePos.x, spherePos.y);
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                spherePos.x = e.clientX;
                spherePos.y = e.clientY;
            }
        });

        // Touch support
        sphere.addEventListener('touchstart', (e) => { isDragging = true; e.preventDefault(); });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                spherePos.x = e.touches[0].clientX;
                spherePos.y = e.touches[0].clientY;
            }
        });

        function triggerPulse(x, y) {
            const wave = document.createElement('div');
            wave.className = 'pulse-wave';
            wave.style.left = `${x}px`;
            wave.style.top = `${y}px`;
            document.body.appendChild(wave);
            setTimeout(() => wave.remove(), 1500);
        }

        // --- GRID RENDERING (Gravity Warp) ---
        function drawGrid() {
            ctx.fillStyle = '#020204';
            ctx.fillRect(0, 0, width, height);

            const gridSize = 40;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;

            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                for (let y = 0; y < height; y += 5) {
                    const dx = x - spherePos.x;
                    const dy = y - spherePos.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const warp = Math.max(0, 100 - dist) * 0.5;
                    const offsetX = (dx / dist) * warp || 0;
                    ctx.lineTo(x - offsetX, y);
                }
                ctx.stroke();
            }

            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                for (let x = 0; x < width; x += 5) {
                    const dx = x - spherePos.x;
                    const dy = y - spherePos.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const warp = Math.max(0, 100 - dist) * 0.5;
                    const offsetY = (dy / dist) * warp || 0;
                    ctx.lineTo(x, y - offsetY);
                }
                ctx.stroke();
            }
        }

        // --- ALAN ENGINE (Pulse) ---
        let alanPhase = 0;
        function update() {
            // Update Sphere Position
            sphere.style.left = `${spherePos.x - 50}px`;
            sphere.style.top = `${spherePos.y - 50}px`;

            // Alan Pulse calculation
            alanPhase += 0.02;
            const pulse = Math.sin(alanPhase) * 10;
            const shadowIntensity = 40 + pulse;
            sphere.style.boxShadow = `0 0 ${shadowIntensity}px ${colors[currentState]}`;

            drawGrid();
            requestAnimationFrame(update);
        }
        update();

        // --- STATE MANAGEMENT ---
        function setState(state) {
            currentState = state;
            statusText.textContent = state.toUpperCase();
            statusText.style.color = colors[state];
            sphere.style.background = `radial-gradient(circle at 30% 30%, ${colors[state]}, #000)`;
        }

        function toggleBMenu() {
            settings.style.display = settings.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'b') toggleBMenu();
            if (e.key.toLowerCase() === 's') { setState('sync'); triggerPulse(spherePos.x, spherePos.y); setTimeout(()=>setState('idle'), 1000); }
        });

        function setStyle(s) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            // Logic for grid density here
        }

        function updateGridY() {
            gridYOffset = document.getElementById('gridY').value / 100;
        }

        // --- SOVEREIGN BRAIN LINK ---
        const chatInput = document.getElementById('chat-input');
        const chatOutput = document.getElementById('chat-output');

        chatInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && chatInput.value.trim() !== '') {
                const prompt = chatInput.value;
                chatInput.value = '';
                addMessage(`MÁTÉ: ${prompt}`, 'user');
                await askOra(prompt);
            }
        });

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.style.marginBottom = '10px';
            div.style.opacity = '0';
            div.style.transition = 'opacity 0.5s';
            div.textContent = text;
            chatOutput.appendChild(div);
            setTimeout(() => div.style.opacity = '1', 10);
            chatOutput.scrollTop = chatOutput.scrollHeight;
        }

        async function askOra(prompt) {
            setState('think');
            
            const key = localStorage.getItem('hope_api_key');
            if (!key) {
                setTimeout(() => {
                    addMessage("ORA: Neural Key Missing. Please set it in config.", "ora");
                    setState('idle');
                }, 1000);
                return;
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: [{ role: "user", content: prompt }],
                        stream: true
                    })
                });

                setState('ora');
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "ORA: ";
                const responseDiv = document.createElement('div');
                responseDiv.style.marginBottom = '10px';
                responseDiv.textContent = "ORA: ";
                chatOutput.appendChild(responseDiv);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            const data = JSON.parse(line.substring(6));
                            const content = data.choices[0].delta.content || "";
                            responseDiv.textContent += content;
                            chatOutput.scrollTop = chatOutput.scrollHeight;
                            // Alan pulse sync
                            triggerPulse(spherePos.x, spherePos.y);
                        }
                    }
                }
                setState('idle');

            } catch (e) {
                addMessage("ORA: Handshake failed. System unstable.", "ora");
                setState('idle');
            }
        }

        console.log("HOPE-OS: Genome Initialized. Chain Valid.");
    </script>
</body>
</html>
