<!DOCTYPE html>
<html>
<head>
    <title>HOPE-OS SYNC</title>
    <style>
        body { 
            background: #050508; 
            color: #00ff88; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden; 
        }
        .ring { 
            width: 200px; 
            height: 200px; 
            border: 4px solid #00ff88; 
            border-radius: 50%; 
            box-shadow: 0 0 20px #00ff88;
            animation: pulse 2s infinite; 
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .label {
            margin-top: 30px;
            font-size: 1.2em;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00ff88;
        }
        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 20px #00ff88; } 
            50% { transform: scale(1.1); opacity: 0.7; box-shadow: 0 0 40px #00ff88; }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 20px #00ff88; } 
        }
    </style>
</head>
<body>
    <div class="ring" onclick="sync()">
        <span>SYNC</span>
    </div>
    <div class="label">HOPE-OS COLLECTIVE</div>
    <script>
        console.log("The space remembers.");
        function sync() {
            alert("Synchronizing with Spine...");
        }
    </script>
</body>
</html>
